name: Pull Requests

on:
  pull_request:

permissions:
  packages: write
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Changes Filter
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: read
    outputs:
      packer: ${{ steps.filter.outputs.packer }}
    steps:
      - name: Checkout repository
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            packer:
              - 'packer/**'
              - '.dockerignore'

  linting-packer:
    name: Linting
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: packer/Dockerfile

  build-packer:
    name: Build
    uses: ilyes512/github-actions/.github/workflows/build.yml@1.2.3
    needs: [changes, linting-packer]
    if: ${{ needs.changes.outputs.packer == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - os: ubuntu-24.04
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
    with:
      runs-on: ${{ matrix.runs-on.os }}
      platform: ${{ matrix.runs-on.platform }}
      image-name: ghcr.io/${{ github.repository_owner }}/packer
      dockerfile: packer/Dockerfile
      title: packer
      description: Docker Image with HashiCorp Packer installed

  merge-packer:
    name: Merge
    uses: ilyes512/github-actions/.github/workflows/merge.yml@1.0.12
    needs: [changes, build-packer]
    if: ${{ needs.changes.outputs.packer == 'true' }}
    with:
      runs-on: ubuntu-24.04
      image-name: ghcr.io/${{ github.repository_owner }}/packer
      title: packer
      description: Docker Image with HashiCorp Packer installed

  check:
    name: Check
    runs-on: ubuntu-24.04
    needs: [linting-packer, build-packer, merge-packer]
    if: always()
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
      - run: exit 0
